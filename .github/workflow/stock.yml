name: 股票监控
on:
 schedule:
   - cron: '*/5 1-3,5-7 * * 1-5'
 workflow_dispatch:
jobs:
 monitor:
   runs-on: ubuntu-latest
   steps:
     - name: 拉取最新代码
       uses: actions/checkout@v4
       with:
         ref: main
         fetch-depth: 0
     - name: 检查文件
       run: |
         echo "当前目录文件:"
         ls -la
         echo "monitor.py 是否存在:"
         test -f monitor.py && echo "存在" || echo "不存在"
     - name: 设置Python
       uses: actions/setup-python@v5
       with:
         python-version: '3.11'
     - name: 安装依赖
       run: pip install requests
     - name: 运行监控
       env:
         SERVERCHAN_KEY: ${{ secrets.SERVERCHAN_KEY }}
       run: python3 monitor.py
